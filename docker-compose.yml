services:
  api:
    build:
      context: ./backend
    container_name: ruk-lk-api
    restart: unless-stopped
    volumes:
      - ./backend/application-local.properties:/app/application-local.properties:ro
    environment:
      SPRING_PROFILES_ACTIVE: onec,prod,docker
    networks:
      - ruk-lk

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: ruk-lk-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - ruk-lk

networks:
  ruk-lk:
    driver: bridge
