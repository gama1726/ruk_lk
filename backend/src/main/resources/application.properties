spring.application.name=ruk-lk-api
spring.profiles.active=onec
spring.config.encoding=UTF-8
spring.config.import=optional:file:./application-local.properties
server.error.include-message=always
server.servlet.session.cookie.same-site=lax

# Секреты и URL интеграций — в application-local.properties (см. deploy/application-local.properties.example)
app.onec.base-url=
app.onec.publication-user=
app.onec.publication-password=
app.auth.fixed-code=

app.unisender.base-url=https://goapi.unisender.ru/ru/transactional/api/v1
app.unisender.enabled=true
app.unisender.from-email=
app.unisender.api-key=

app.schedule.base-url=

# Фото для пропуска (Perco-Web)
app.pass-photo.storage-dir=./data/pass-photos
app.pass-photo.max-size-bytes=2097152
app.pass-photo.min-width=400
app.pass-photo.min-height=500
app.pass-photo.ml-enabled=true
app.pass-photo.min-face-height-ratio=0.18
app.pass-photo.face-score-threshold=0.6
app.admin.api-token=

# MAX — опциональная отправка кода входа (dev: app.max.enabled=false → код в лог)
app.max.login-option=true
app.max.enabled=false
app.max.api-url=https://platform-api2.max.ru
app.max.bot-token=

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

spring.datasource.url=jdbc:h2:file:./data/ruk-lk;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
