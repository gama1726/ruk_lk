# Docker: API слушает все интерфейсы внутри сети compose (nginx → api:8080).
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=framework

# Данные на volume ./data:/app/data (H2 + фото пропусков)
spring.datasource.url=jdbc:h2:file:/app/data/ruk-lk;MODE=PostgreSQL
app.pass-photo.storage-dir=/app/data/pass-photos
